version: "3.9"

services:

  backend:
    build: ./backend
    container_name: ai-language-helper-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/audio_responses:/app/audio_responses

  frontend:
    build: ./frontend
    container_name: ai-language-helper-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend